services:
  - type: web
    name: ai-web-agent-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: GMAIL_USER
        value: ""
      - key: GMAIL_APP_PASSWORD
        value: ""
      - key: PORT
        value: 3000
